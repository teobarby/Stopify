<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="480" viewBox="0 0 1160 480">
  <rect x="0" y="0" width="1160" height="480" fill="#ffffff"/>

  <text x="580" y="44" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#263238">Schema ER — notazione Chen</text>

  <!-- Attribute connector lines (drawn first, under the shapes) -->
  <g stroke="#546e7a" stroke-width="1.5">
    <!-- USER attributes -->
    <line x1="300" y1="120" x2="280" y2="270"/>
    <line x1="160" y1="135" x2="280" y2="270"/>
    <line x1="70"  y1="225" x2="280" y2="270"/>
    <line x1="140" y1="370" x2="280" y2="270"/>
    <line x1="310" y1="390" x2="280" y2="270"/>
    <!-- SONG attributes -->
    <line x1="640"  y1="150" x2="820" y2="270"/>
    <line x1="760"  y1="100" x2="820" y2="270"/>
    <line x1="900"  y1="85"  x2="820" y2="270"/>
    <line x1="1010" y1="140" x2="820" y2="270"/>
    <line x1="1060" y1="215" x2="820" y2="270"/>
    <line x1="1075" y1="290" x2="820" y2="270"/>
    <line x1="990"  y1="370" x2="820" y2="270"/>
    <line x1="860"  y1="420" x2="820" y2="270"/>
    <line x1="700"  y1="390" x2="820" y2="270"/>
    <!-- Relationship lines -->
    <line x1="360" y1="270" x2="455" y2="270" stroke-width="2"/>
    <line x1="585" y1="270" x2="740" y2="270" stroke-width="2"/>
  </g>

  <!-- Cardinalities -->
  <text x="407" y="260" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">(0, N)</text>
  <text x="662" y="260" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#263238">(0, 1)</text>

  <!-- USER entity -->
  <rect x="200" y="240" width="160" height="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="280" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d47a1">USER</text>

  <!-- SONG entity -->
  <rect x="740" y="240" width="160" height="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="820" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d47a1">SONG</text>

  <!-- Pubblica relationship -->
  <polygon points="455,270 520,235 585,270 520,305" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="520" y="275" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#bf360c">Pubblica</text>

  <!-- USER attribute ellipses -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#263238">
    <ellipse cx="300" cy="120" rx="55" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="300" y="125" text-anchor="middle" text-decoration="underline">id</text>
    <ellipse cx="160" cy="135" rx="62" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="160" y="140" text-anchor="middle">username</text>
    <ellipse cx="70" cy="225" rx="55" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="70" y="230" text-anchor="middle">email</text>
    <ellipse cx="140" cy="370" rx="75" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="140" y="375" text-anchor="middle">password_hash</text>
    <ellipse cx="310" cy="390" rx="60" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="310" y="395" text-anchor="middle">is_admin</text>
  </g>

  <!-- SONG attribute ellipses -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#263238">
    <ellipse cx="640" cy="150" rx="55" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="640" y="155" text-anchor="middle" text-decoration="underline">id</text>
    <ellipse cx="760" cy="100" rx="55" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="760" y="105" text-anchor="middle">title</text>
    <ellipse cx="900" cy="85" rx="70" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="900" y="90" text-anchor="middle">artist_name</text>
    <ellipse cx="1010" cy="140" rx="72" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="1010" y="145" text-anchor="middle">album_name</text>
    <ellipse cx="1060" cy="215" rx="55" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="1060" y="220" text-anchor="middle">lyrics</text>
    <ellipse cx="1075" cy="290" rx="75" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="1075" y="295" text-anchor="middle">synced_lyrics</text>
    <ellipse cx="990" cy="370" rx="60" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="990" y="375" text-anchor="middle">duration</text>
    <ellipse cx="860" cy="420" rx="70" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="860" y="425" text-anchor="middle">instrumental</text>
    <ellipse cx="700" cy="390" rx="65" ry="22" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
    <text x="700" y="395" text-anchor="middle">created_at</text>
  </g>
</svg>
